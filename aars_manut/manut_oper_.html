<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecionar Operador</title>

<style>
:root{
  --green:#0f6a53;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#f4f7f3 0%,#e8efeb 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.splash{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,#0f5b49,#0c4a3b);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
  transition:opacity .45s ease, visibility .45s ease;
}
.splash.hide{opacity:0;visibility:hidden}
.splash img{width:min(62vw,260px);filter:drop-shadow(0 10px 26px rgba(0,0,0,.22));animation:pulse 1.1s ease-in-out infinite alternate}
@keyframes pulse{from{transform:scale(.96)}to{transform:scale(1)}}
.card{
  background:#fff;
  padding:24px;
  border-radius:22px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
  width:min(92vw,360px);
  text-align:center;
  border:1px solid rgba(15,106,83,.08);
}
.logo-select{margin-bottom:14px}
.logo-select img{width:min(58vw,220px);height:auto;display:block;margin:0 auto;filter:drop-shadow(0 8px 22px rgba(0,0,0,.12))}
h1{
  font-size:20px;
  margin:0 0 10px;
  color:#173a34;
}
.subtitle{
  font-size:13px;
  color:#666;
  margin-bottom:15px;
}
select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  margin-top:10px;
  font-size:15px;
}
button{
  margin-top:18px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--green);
  color:#fff;
  font-weight:bold;
  font-size:15px;
  box-shadow:0 8px 18px rgba(15,106,83,.18);
}
button:active{transform:translateY(1px)}
</style>
</head>

<body>

<div class="splash" id="splash">
  <img src="manutAARS_512.png" alt="Manutenção AARS">
</div>

<div class="card">
  <div class="logo-select"><img src="manutAARS_512.png" alt="Manutenção AARS"></div>
  <h1>Selecione o operador</h1>
  <div class="subtitle">Selecione o operador</div>

  <select id="user">
    <option value="">Escolha</option>
    <option>Associado</option>
    <option>Bronzeri</option>
    <option>Diogo</option>
    <option>Leonardo</option>
    <option>Natanael</option>
    <option>Reginaldo</option>
    <option>Segurança</option>
  </select>

  <button onclick="entrar()">Entrar</button>
</div>

<script>
function entrar(){
  const user = document.getElementById('user').value;

  if(!user){
    alert('Selecione um operador');
    return;
  }

  localStorage.setItem('operador', user);

  window.location.href = 'manut_oper_app.html';
}

function hideSplash(){
  const splash = document.getElementById('splash');
  if(splash){
    setTimeout(() => splash.classList.add('hide'), 650);
  }
}

window.onload = () => {
  hideSplash();
  const user = localStorage.getItem('operador');
  if(user){
    setTimeout(() => {
      window.location.href = 'manut_oper_app.html';
    }, 700);
  }
}
</script>

</body>
</html>
